version: '3'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vector_postgres
    restart: always
    environment:
      POSTGRES_DB: vector_search
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: vector_redis
    restart: always
    ports:
      - "6379:6379" 
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
